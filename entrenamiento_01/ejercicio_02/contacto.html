<!DOCTYPE html lang="es">
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Recetas</title>
    <link rel="stylesheet" href="styles_contacto.css">
</head>

<body>
    <nav class="navegador">
        <span class="item_nav"><a href="./index.html" class="navegador_link">HOME</a></span>
        <span class="item_nav"> | </span>
        <span class="item_nav"><a href="./contacto.html" class="navegador_link">CONTACTO</a></span>
    </nav>
    <br>

    <main class="contenido_formulario">
        <section class="ingreso_datos">
            <article class="ingreso">
                <label for="nombre">Nombre: </label><input type="text" id="nombre">
            </article>

            <article class="ingreso">
                <label for="email">E-Mail: </label><input type="text" id="email">
            </article>
            <article class="ingreso">
                <label for="telefono">Tel: </label><input type="text" id="telefono">
            </article>
            <article class="ingreso">
                <label for="mensaje">Mensaje:</label><textarea type="text" id="mensaje" size="100"></textarea>
            </article>

        </section>



        <article class="envio">
            <button id="envio" class="boton">Enviar</button>
            <button id="cancelar" class="boton">Cancelar</button>
        </article>





    </main><br>

    <footer>
        Todos los derechos reservados.
    </footer>



</body>
